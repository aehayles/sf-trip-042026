<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Trip 🌉</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --fog: #f0ede8;
    --ink: #1a1714;
    --muted: #6b6560;
    --panel: #faf9f7;
    --border: #e2ddd8;
    --accent: #d4521a;

    --c-presidio: #2d7dd2;
    --c-ggpark: #3a9e5f;
    --c-wharf: #c07a1f;
    --c-chinatown: #c94f4f;
    --c-nobhill: #7b52ab;
    --c-soma: #3a8fa8;
    --c-mission: #d4521a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--fog);
    color: var(--ink);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 340px;
    min-width: 340px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 10;
  }

  #sidebar-header {
    padding: 20px 20px 14px;
    border-bottom: 1px solid var(--border);
  }

  #sidebar-header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  #sidebar-header h1 span { color: var(--accent); }

  #sidebar-header p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 300;
  }

  /* filters */
  #filters {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .filter-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2px;
  }

  .chip {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: white;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .chip:hover { border-color: var(--ink); color: var(--ink); }
  .chip.active { background: var(--ink); color: white; border-color: var(--ink); }

  .chip[data-hood="Presidio / GG"].active { background: var(--c-presidio); border-color: var(--c-presidio); }
  .chip[data-hood="GG Park"].active { background: var(--c-ggpark); border-color: var(--c-ggpark); }
  .chip[data-hood="Fisherman's Wharf"].active { background: var(--c-wharf); border-color: var(--c-wharf); }
  .chip[data-hood="Chinatown / North Beach"].active { background: var(--c-chinatown); border-color: var(--c-chinatown); }
  .chip[data-hood="Nob Hill / Polk"].active { background: var(--c-nobhill); border-color: var(--c-nobhill); }
  .chip[data-hood="SoMa / Civic Center"].active { background: var(--c-soma); border-color: var(--c-soma); }
  .chip[data-hood="Mission / Castro"].active { background: var(--c-mission); border-color: var(--c-mission); }

  /* search */
  #search-wrap {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }

  #search {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: white;
    outline: none;
    transition: border-color 0.15s;
  }
  #search:focus { border-color: var(--ink); }

  /* spot list */
  #spot-list {
    overflow-y: auto;
    flex: 1;
    padding: 8px 0;
  }

  .spot-item {
    padding: 10px 16px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    position: relative;
  }

  .spot-item:hover { background: var(--fog); }
  .spot-item.active { background: var(--fog); }
  .spot-item.visited { opacity: 0.5; }

  .spot-top {
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }

  .spot-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-top: 4px;
    flex-shrink: 0;
  }

  .spot-name {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.3;
    flex: 1;
  }

  .spot-visited-check {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    font-size: 10px;
    color: transparent;
    background: white;
  }

  .spot-visited-check:hover { border-color: #3a9e5f; color: #3a9e5f; }
  .visited .spot-visited-check { background: #3a9e5f; border-color: #3a9e5f; color: white; }

  .spot-meta {
    display: flex;
    gap: 6px;
    margin-top: 4px;
    margin-left: 18px;
    flex-wrap: wrap;
  }

  .spot-tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 500;
  }

  .tag-hood {
    background: #f0ede8;
    color: var(--muted);
  }

  .tag-type {
    background: #eef0f5;
    color: #4a5580;
  }

  .spot-note-preview {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    margin-top: 3px;
    margin-left: 18px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 260px;
  }

  #stats {
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }

  /* ── MAP ── */
  #map {
    flex: 1;
    position: relative;
  }

  /* ── POPUP PANEL ── */
  #detail-panel {
    position: absolute;
    bottom: 24px;
    right: 24px;
    width: 300px;
    background: white;
    border-radius: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    padding: 18px;
    z-index: 1000;
    display: none;
    animation: slideUp 0.2s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  #detail-panel.show { display: block; }

  #detail-close {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--fog);
    border: none;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
  }

  #detail-color-bar {
    width: 32px;
    height: 4px;
    border-radius: 2px;
    margin-bottom: 10px;
  }

  #detail-name {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 4px;
    padding-right: 20px;
  }

  #detail-tags {
    display: flex;
    gap: 5px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  #detail-note-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
  }

  #detail-note {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    resize: none;
    height: 64px;
    outline: none;
    transition: border-color 0.15s;
    color: var(--ink);
  }

  #detail-note:focus { border-color: var(--ink); }

  #detail-visited-btn {
    margin-top: 10px;
    width: 100%;
    padding: 9px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--ink);
  }

  #detail-visited-btn:hover { background: var(--fog); }
  #detail-visited-btn.visited-active { background: #3a9e5f; border-color: #3a9e5f; color: white; }

  #detail-tip {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    margin-top: 8px;
    line-height: 1.4;
  }

  /* leaflet overrides */
  .leaflet-popup { display: none !important; }

  .custom-marker {
    width: 28px;
    height: 28px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    border: 2px solid white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    cursor: pointer;
    transition: transform 0.15s;
  }

  .custom-marker.visited-marker {
    opacity: 0.45;
  }

  .reset-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    padding: 0;
  }

  .reset-btn:hover { color: var(--ink); }

  .empty-msg {
    padding: 32px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>SF Trip <span>4/20</span> 🌉</h1>
    <p>Click a spot to add notes or mark visited</p>
  </div>

  <div id="filters">
    <div>
      <div class="filter-label">Neighborhood</div>
      <div class="filter-row" id="hood-chips"></div>
    </div>
    <div>
      <div class="filter-label">Type</div>
      <div class="filter-row" id="type-chips"></div>
    </div>
  </div>

  <div id="search-wrap">
    <input id="search" type="text" placeholder="Search spots…" />
  </div>

  <div id="spot-list"></div>

  <div id="stats">
    <span id="stats-count"></span>
    <button class="reset-btn" id="reset-btn">Reset all</button>
  </div>
</div>

<div id="map"></div>

<div id="detail-panel">
  <button id="detail-close">✕</button>
  <div id="detail-color-bar"></div>
  <div id="detail-name"></div>
  <div id="detail-tags"></div>
  <div id="detail-note-label">Group note</div>
  <textarea id="detail-note" placeholder="Add a note for the group…"></textarea>
  <button id="detail-visited-btn">Mark as visited ✓</button>
  <div id="detail-tip"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SPOTS = [
  // Presidio / GG
  { id: 's1',  name: 'Golden Gate Bridge',     lat: 37.8199,  lng: -122.4786, hood: 'Presidio / GG', type: 'Landmark',    tip: 'Go early or at sunset — wind picks up midday. Walk the east sidewalk.' },
  { id: 's2',  name: 'Golden Gate Overlook',   lat: 37.8040,  lng: -122.4767, hood: 'Presidio / GG', type: 'Landmark',    tip: 'Best front-facing view of the bridge. Go at dusk.' },
  { id: 's3',  name: "Land's End Trail",       lat: 37.7858,  lng: -122.5034, hood: 'Presidio / GG', type: 'Outdoors',    tip: 'Coastal cliffside hike ~2 miles. Check out the Labyrinth overlook.' },
  // GG Park
  { id: 's4',  name: 'Golden Gate Park',       lat: 37.7689,  lng: -122.4830, hood: 'GG Park',       type: 'Outdoors',    tip: '1,000 acres. Rent bikes to get around — the shuttle is fine too.' },
  { id: 's5',  name: 'Hippie Hill (4/20)',      lat: 37.7699,  lng: -122.4579, hood: 'GG Park',       type: 'Outdoors',    tip: 'Annual 4/20 gathering spot inside GG Park. Gets packed by noon.' },
  // Inner Sunset
  { id: 's6',  name: 'San Tung Chicken Wings', lat: 37.7638,  lng: -122.4690, hood: 'GG Park',       type: 'Food',        tip: 'Legendary dry-fried wings. Closed Tue–Wed. Expect a wait.' },
  // Fisherman's Wharf
  { id: 's7',  name: "Fisherman's Wharf",      lat: 37.8086,  lng: -122.4125, hood: "Fisherman's Wharf", type: 'Landmark', tip: 'Walk the waterfront. Good for a crab cup and sourdough bowl.' },
  { id: 's8',  name: 'Red and White Fleet',    lat: 37.8091,  lng: -122.4151, hood: "Fisherman's Wharf", type: 'Activity', tip: 'Bay cruise ~90 min. Book ahead. Passes under GG Bridge + near Alcatraz.' },
  { id: 's9',  name: 'Buena Vista Café',       lat: 37.8065,  lng: -122.4207, hood: "Fisherman's Wharf", type: 'Food',    tip: 'Famous Irish coffee. Opens 9am. Lines form fast on weekends.' },
  { id: 's10', name: 'Alcatraz Island',        lat: 37.8270,  lng: -122.4230, hood: "Fisherman's Wharf", type: 'Activity', tip: 'Book ferry tickets way in advance. Audio tour is excellent. ~3 hrs.' },
  // Cow Hollow / Marina
  { id: 's11', name: 'Komeya No Bento',        lat: 37.8001,  lng: -122.4314, hood: "Fisherman's Wharf", type: 'Food',    tip: 'Bento boxes + great matcha drinks. Closed Sun–Mon. Order online.' },
  // Chinatown / North Beach
  { id: 's12', name: 'Good Mong Kok Bakery',   lat: 37.7955,  lng: -122.4084, hood: 'Chinatown / North Beach', type: 'Food', tip: 'Cheapest dim sum in SF. Cash only, takeout only. Get there early.' },
  { id: 's13', name: 'Rice Roll Express',       lat: 37.7962,  lng: -122.4085, hood: 'Chinatown / North Beach', type: 'Food', tip: 'Silky rice rolls. Cash or Venmo. Try the chili oil wontons.' },
  { id: 's14', name: 'Tupelo',                  lat: 37.7993,  lng: -122.4075, hood: 'Chinatown / North Beach', type: 'Bar',  tip: 'Bar + karaoke + live music. Monday night jam sessions.' },
  { id: 's15', name: 'Il Canto Café',           lat: 37.7940,  lng: -122.4007, hood: 'Chinatown / North Beach', type: 'Food', tip: 'Monster breakfast burritos. Mon–Fri only. Weekday mornings.' },
  // Nob Hill / Polk
  { id: 's16', name: 'Hot Sauce and Panko',     lat: 37.7945,  lng: -122.4180, hood: 'Nob Hill / Polk',  type: 'Food',    tip: 'Wings + waffles takeout window. Wed–Sun only. Order online first.' },
  { id: 's17', name: 'Upcider',                 lat: 37.7875,  lng: -122.4198, hood: 'Nob Hill / Polk',  type: 'Bar',     tip: '18 ciders on tap. Great date spot. Tue–Sat evenings only.' },
  { id: 's18', name: 'AURA Grace Light Show',   lat: 37.7919,  lng: -122.4134, hood: 'Nob Hill / Polk',  type: 'Activity', tip: 'Immersive light show inside Grace Cathedral. Evenings only, 6–9pm. Buy tickets in advance.' },
  { id: 's19', name: 'Ride a Cable Car',        lat: 37.7925,  lng: -122.4120, hood: 'Nob Hill / Polk',  type: 'Activity', tip: 'Powell-Hyde line is the most scenic. Expect a line — board at the turnaround.' },
  // SoMa / Civic Center
  { id: 's20', name: 'SF MoMA',                 lat: 37.7857,  lng: -122.4011, hood: 'SoMa / Civic Center', type: 'Activity', tip: 'Closed Wednesdays. Free first Sunday of the month. KAWS exhibit is on.' },
  { id: 's21', name: 'Deli Board Sandwich',     lat: 37.7776,  lng: -122.4071, hood: 'SoMa / Civic Center', type: 'Food',    tip: 'Legendary sandwiches. Tue–Sun lunch only. Line is worth it. Max 6 orders.' },
  { id: 's22', name: 'Café Okawari',            lat: 37.7782,  lng: -122.3939, hood: 'SoMa / Civic Center', type: 'Food',    tip: 'Katsu sandos. Mon–Fri only. Small spot, fast service.' },
  { id: 's23', name: "Moe Green's",             lat: 37.7781,  lng: -122.4160, hood: 'SoMa / Civic Center', type: 'Dispensary', tip: 'Dispensary + lounge. Dab bar inside. Open daily 9am–9:55pm.' },
  // Japantown / Fillmore
  { id: 's24', name: 'Niniku Ramen',            lat: 37.7857,  lng: -122.4330, hood: 'SoMa / Civic Center', type: 'Food',    tip: 'Japantown ramen. $16 lunch special is a great deal. Happy hour too.' },
  // Mission / Castro
  { id: 's25', name: 'Dolores Park (4/20)',     lat: 37.7602,  lng: -122.4268, hood: 'Mission / Castro',  type: 'Outdoors', tip: 'The 4/20 party. Gets packed. City skyline views are stunning.' },
  { id: 's26', name: 'Señor Sisig',             lat: 37.7571,  lng: -122.4213, hood: 'Mission / Castro',  type: 'Food',     tip: 'Filipino burritos. Covered patio in back. Ube horchata is a must.' },
  { id: 's27', name: 'The Royal Cuckoo',        lat: 37.7454,  lng: -122.4202, hood: 'Mission / Castro',  type: 'Bar',      tip: 'Organ music bar. Opens 4pm daily. Organ player shows up after 8pm.' },
  { id: 's28', name: 'Urbana Dispensary',       lat: 37.7439,  lng: -122.4217, hood: 'Mission / Castro',  type: 'Dispensary', tip: 'Dispensary + lounge. Dog friendly. Complimentary WiFi. Open daily.' },
  { id: 's29', name: 'Photobooth Museum',       lat: 37.7646,  lng: -122.4320, hood: 'Mission / Castro',  type: 'Activity', tip: 'Vintage photo booths in the Castro. Fri–Sat open late.' },
  { id: 's30', name: 'Twin Peaks',              lat: 37.7544,  lng: -122.4477, hood: 'Mission / Castro',  type: 'Landmark',  tip: 'Best 360° city view. Go at dusk. Wind is serious — bring a layer.' },
  { id: 's31', name: 'Comedy Show',             lat: 37.7800,  lng: -122.4100, hood: 'SoMa / Civic Center', type: 'Activity', tip: 'TBD — check Cobb\'s Comedy Club or SF Punchline for shows.' },
  { id: 's32', name: 'Wake & Bake',             lat: 37.7699,  lng: -122.4579, hood: 'GG Park',          type: 'Activity',  tip: 'Hippie Hill or Dolores Park on 4/20 morning.' },
];

const HOOD_COLORS = {
  'Presidio / GG':           '#2d7dd2',
  'GG Park':                 '#3a9e5f',
  "Fisherman's Wharf":       '#c07a1f',
  'Chinatown / North Beach': '#c94f4f',
  'Nob Hill / Polk':         '#7b52ab',
  'SoMa / Civic Center':     '#3a8fa8',
  'Mission / Castro':        '#d4521a',
};

const TYPE_ICONS = {
  'Food': '🍜', 'Bar': '🍺', 'Landmark': '🌉',
  'Outdoors': '🌲', 'Activity': '🎟️', 'Dispensary': '🌿'
};

// State
let state = {
  activeHoods: new Set(),
  activeTypes: new Set(),
  searchQ: '',
  selected: null,
  visited: {},
  notes: {},
};

function loadState() {
  try {
    const saved = localStorage.getItem('sf-trip-state');
    if (saved) {
      const parsed = JSON.parse(saved);
      state.visited = parsed.visited || {};
      state.notes   = parsed.notes   || {};
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem('sf-trip-state', JSON.stringify({
      visited: state.visited,
      notes:   state.notes,
    }));
  } catch(e) {}
}

loadState();

// Map
const map = L.map('map', { zoomControl: false }).setView([37.78, -122.435], 13);
L.control.zoom({ position: 'topright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  maxZoom: 19,
}).addTo(map);

// Markers
const markers = {};

function makeIcon(spot) {
  const color = HOOD_COLORS[spot.hood] || '#888';
  const visited = state.visited[spot.id];
  return L.divIcon({
    className: '',
    html: `<div class="custom-marker ${visited ? 'visited-marker' : ''}" style="background:${color}"></div>`,
    iconSize: [28, 28],
    iconAnchor: [14, 28],
  });
}

SPOTS.forEach(spot => {
  const marker = L.marker([spot.lat, spot.lng], { icon: makeIcon(spot) }).addTo(map);
  marker.on('click', () => openDetail(spot.id));
  markers[spot.id] = marker;
});

function refreshMarkers() {
  SPOTS.forEach(spot => {
    markers[spot.id].setIcon(makeIcon(spot));
    const visible = isVisible(spot);
    if (visible) markers[spot.id].addTo(map);
    else map.removeLayer(markers[spot.id]);
  });
}

// Filters
const hoods = [...new Set(SPOTS.map(s => s.hood))];
const types = [...new Set(SPOTS.map(s => s.type))];

const hoodChips = document.getElementById('hood-chips');
hoods.forEach(h => {
  const btn = document.createElement('button');
  btn.className = 'chip';
  btn.textContent = h;
  btn.dataset.hood = h;
  btn.style.borderLeftColor = HOOD_COLORS[h];
  btn.addEventListener('click', () => {
    if (state.activeHoods.has(h)) state.activeHoods.delete(h);
    else state.activeHoods.add(h);
    btn.classList.toggle('active');
    render();
  });
  hoodChips.appendChild(btn);
});

const typeChips = document.getElementById('type-chips');
types.forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'chip';
  btn.textContent = `${TYPE_ICONS[t] || ''} ${t}`;
  btn.addEventListener('click', () => {
    if (state.activeTypes.has(t)) state.activeTypes.delete(t);
    else state.activeTypes.add(t);
    btn.classList.toggle('active');
    render();
  });
  typeChips.appendChild(btn);
});

document.getElementById('search').addEventListener('input', e => {
  state.searchQ = e.target.value.toLowerCase();
  render();
});

document.getElementById('reset-btn').addEventListener('click', () => {
  if (!confirm('Reset all visited & notes?')) return;
  state.visited = {};
  state.notes = {};
  saveState();
  closeDetail();
  render();
  refreshMarkers();
});

// Visibility
function isVisible(spot) {
  const hoodOk = state.activeHoods.size === 0 || state.activeHoods.has(spot.hood);
  const typeOk = state.activeTypes.size === 0 || state.activeTypes.has(spot.type);
  const searchOk = !state.searchQ || spot.name.toLowerCase().includes(state.searchQ) || spot.hood.toLowerCase().includes(state.searchQ);
  return hoodOk && typeOk && searchOk;
}

// Spot list
function render() {
  const list = document.getElementById('spot-list');
  list.innerHTML = '';
  const visible = SPOTS.filter(isVisible);

  if (visible.length === 0) {
    list.innerHTML = '<div class="empty-msg">No spots match your filters.</div>';
  }

  visible.forEach(spot => {
    const div = document.createElement('div');
    div.className = 'spot-item' + (state.visited[spot.id] ? ' visited' : '') + (state.selected === spot.id ? ' active' : '');
    div.dataset.id = spot.id;

    const notePreview = state.notes[spot.id] ? `<div class="spot-note-preview">📝 ${state.notes[spot.id]}</div>` : '';

    div.innerHTML = `
      <div class="spot-top">
        <div class="spot-dot" style="background:${HOOD_COLORS[spot.hood]}"></div>
        <div class="spot-name">${spot.name}</div>
        <div class="spot-visited-check" title="Mark visited">✓</div>
      </div>
      <div class="spot-meta">
        <span class="spot-tag tag-hood">${spot.hood}</span>
        <span class="spot-tag tag-type">${TYPE_ICONS[spot.type] || ''} ${spot.type}</span>
      </div>
      ${notePreview}
    `;

    div.querySelector('.spot-visited-check').addEventListener('click', e => {
      e.stopPropagation();
      toggleVisited(spot.id);
    });

    div.addEventListener('click', () => {
      openDetail(spot.id);
      map.flyTo([spot.lat, spot.lng], 15, { duration: 0.8 });
    });

    list.appendChild(div);
  });

  // Stats
  const visitedCount = Object.values(state.visited).filter(Boolean).length;
  document.getElementById('stats-count').textContent = `${visitedCount} / ${SPOTS.length} visited`;

  refreshMarkers();
}

// Detail panel
let noteTimeout;

function openDetail(id) {
  state.selected = id;
  const spot = SPOTS.find(s => s.id === id);
  const panel = document.getElementById('detail-panel');

  document.getElementById('detail-color-bar').style.background = HOOD_COLORS[spot.hood];
  document.getElementById('detail-name').textContent = spot.name;
  document.getElementById('detail-tags').innerHTML = `
    <span class="spot-tag tag-hood">${spot.hood}</span>
    <span class="spot-tag tag-type">${TYPE_ICONS[spot.type] || ''} ${spot.type}</span>
  `;
  document.getElementById('detail-note').value = state.notes[id] || '';
  document.getElementById('detail-tip').textContent = spot.tip || '';

  const btn = document.getElementById('detail-visited-btn');
  btn.textContent = state.visited[id] ? '✓ Visited!' : 'Mark as visited ✓';
  btn.className = 'detail-visited-btn' + (state.visited[id] ? ' visited-active' : '');
  btn.style.cssText = state.visited[id]
    ? 'margin-top:10px;width:100%;padding:9px;border-radius:8px;border:1.5px solid #3a9e5f;background:#3a9e5f;font-family:DM Sans,sans-serif;font-size:12px;font-weight:500;cursor:pointer;color:white;'
    : 'margin-top:10px;width:100%;padding:9px;border-radius:8px;border:1.5px solid #e2ddd8;background:white;font-family:DM Sans,sans-serif;font-size:12px;font-weight:500;cursor:pointer;color:#1a1714;';

  panel.classList.add('show');
  render();
}

function closeDetail() {
  state.selected = null;
  document.getElementById('detail-panel').classList.remove('show');
  render();
}

document.getElementById('detail-close').addEventListener('click', closeDetail);

document.getElementById('detail-note').addEventListener('input', e => {
  const id = state.selected;
  if (!id) return;
  state.notes[id] = e.target.value;
  clearTimeout(noteTimeout);
  noteTimeout = setTimeout(() => { saveState(); render(); }, 600);
});

document.getElementById('detail-visited-btn').addEventListener('click', () => {
  if (state.selected) toggleVisited(state.selected);
});

function toggleVisited(id) {
  state.visited[id] = !state.visited[id];
  saveState();
  if (state.selected === id) openDetail(id);
  else render();
}

// Close panel when clicking map
map.on('click', () => closeDetail());

// Init
render();
</script>
</body>
</html>
